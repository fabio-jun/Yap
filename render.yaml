services:
  - type: web
    name: yap-api
    runtime: docker
    dockerfilePath: ./yap-api/Dockerfile
    dockerContext: ./yap-api
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: BlogAPI
      - key: Jwt__Audience
        value: BlogClient
      - key: Redis__Connection
        sync: false
      - key: Storage__Provider
        value: AzureBlob
      - key: AzureBlob__ConnectionString
        sync: false
      - key: AzureBlob__ContainerName
        sync: false
      - key: Cors__AllowedOrigins__0
        sync: false
